<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Cinemago</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');

  :root{
    --bg: #17121f;
    --bg-alt: #1f1829;
    --card: #241c30;
    --card-torn: #1a1522;
    --gold: #e3b23c;
    --red: #c8385a;
    --green: #4caf7d;
    --cream: #f3ede2;
    --muted: #8d8299;
    --line: #3a2f47;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-top: env(safe-area-inset-top, 0px);
  }

  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body{ margin:0; padding:0; }

  body{
    background:
      radial-gradient(circle at 20% 0%, rgba(200,56,90,0.12), transparent 45%),
      radial-gradient(circle at 80% 10%, rgba(227,178,60,0.08), transparent 40%),
      var(--bg);
    color: var(--cream);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    padding-bottom: calc(90px + var(--safe-bottom));
    -webkit-user-select: none;
    user-select: none;
  }
  input, textarea{ user-select: text; -webkit-user-select: text; }

  /* MARQUEE HERO */
  .marquee{
    position: relative;
    padding: calc(24px + var(--safe-top)) 16px 24px;
    text-align: center;
    border-bottom: 3px dashed var(--line);
  }
  .marquee .bulbs{
    display:flex; justify-content:center; gap:8px; margin-bottom: 12px;
  }
  .marquee .bulbs span{
    width:6px; height:6px; border-radius:50%;
    background: var(--gold);
    box-shadow: 0 0 8px 2px rgba(227,178,60,0.7);
    animation: flicker 2.4s infinite ease-in-out;
  }
  .marquee .bulbs span:nth-child(odd){ animation-delay: 0.6s; }
  .marquee .bulbs span:nth-child(3n){ animation-delay: 1.2s; }
  @keyframes flicker{ 0%,100%{ opacity:1; } 50%{ opacity:0.35; } }
  .marquee h1{
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2rem, 9vw, 2.8rem);
    letter-spacing: 3px;
    margin: 0;
    text-shadow: 0 0 18px rgba(227,178,60,0.25);
  }
  .marquee .sub{
    font-family: 'JetBrains Mono', monospace;
    color: var(--muted);
    font-size: 0.7rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 6px;
  }
  .live-dot{
    display:inline-flex; align-items:center; gap:5px;
    font-family:'JetBrains Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 1px;
    color: var(--green);
    text-transform: uppercase;
    margin-top: 10px;
  }
  .live-dot .pulse{
    width:6px; height:6px; border-radius:50%; background: var(--green);
    animation: pulse 1.6s infinite;
  }
  @keyframes pulse{ 0%,100%{ opacity:1; } 50%{ opacity:0.3; } }

  .stats{ display:flex; justify-content:center; gap: 22px; margin-top: 16px; }
  .stat{ text-align:center; }
  .stat .num{ font-family:'Bebas Neue', sans-serif; font-size: 1.7rem; color: var(--gold); line-height:1; }
  .stat .lbl{ font-family:'JetBrains Mono', monospace; font-size: 0.58rem; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }

  /* SEARCH */
  .search-bar{
    position: relative;
    background: var(--bg);
    padding: 14px 14px 0;
  }
  .search-icon{
    position:absolute; left: 28px; top: 50%; transform: translateY(-50%);
    font-size:0.85rem; opacity:0.6; pointer-events:none;
  }
  .search-bar input{
    width:100%; background: var(--card); border: 1px solid var(--line); color: var(--cream);
    padding: 11px 36px 11px 34px; border-radius: 22px; font-family:'Space Grotesk', sans-serif; font-size: 16px;
  }
  .search-bar input:focus{ outline: 1px solid var(--gold); }
  .clear-search{
    position:absolute; right: 26px; top: 50%; transform: translateY(-50%);
    background:none; border:none; color: var(--muted); font-size: 1rem; cursor:pointer; padding:6px;
  }

  /* CONTROLS */
  .controls{
    position: sticky; top:0; z-index: 20;
    background: rgba(23,18,31,0.92);
    backdrop-filter: blur(8px);
    padding: 10px 14px;
    display:flex; gap:8px; overflow-x:auto;
    border-bottom: 1px solid var(--line);
    scrollbar-width: none;
  }
  .controls::-webkit-scrollbar{ display:none; }
  .tab{
    flex-shrink:0;
    font-family:'JetBrains Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    background: transparent;
    border: 1px solid var(--line);
    color: var(--muted);
    padding: 9px 14px;
    border-radius: 20px;
    cursor: pointer;
  }
  .tab.active{ border-color: var(--gold); color: var(--gold); background: rgba(227,178,60,0.08); }
  .sort-select{
    flex-shrink:0; margin-left:auto;
    font-family:'JetBrains Mono', monospace; font-size: 0.65rem; letter-spacing:0.5px;
    background: transparent; border: 1px solid var(--line); color: var(--muted);
    padding: 8px 10px; border-radius: 20px;
  }

  /* SECTIONS */
  .section{ padding: 18px 14px 0; }
  .section h2{
    font-family:'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 1.5px;
    color: var(--gold);
    border-bottom: 1px solid var(--line);
    padding-bottom: 6px;
    margin: 0 0 12px;
    display:flex; justify-content:space-between; align-items:baseline;
  }
  .section h2 small{ font-family:'JetBrains Mono', monospace; font-size: 0.62rem; color: var(--muted); }
  .stack{ display:flex; flex-direction:column; gap: 12px; margin-bottom: 6px; }

  /* TICKET CARD */
  .ticket{
    position: relative;
    background: var(--card);
    border-radius: 10px;
    padding: 14px 14px 12px;
    display:flex; flex-direction:column; gap:6px;
    border: 1px solid var(--line);
    overflow: hidden;
  }
  .ticket::before, .ticket::after{
    content:""; position:absolute; width: 16px; height: 16px;
    background: var(--bg); border-radius: 50%; top: 50%; transform: translateY(-50%);
  }
  .ticket::before{ left: -8px; }
  .ticket::after{ right: -8px; }
  .ticket .perf{ position:absolute; left:0; right:0; top:50%; border-top: 2px dashed var(--line); }
  .ticket-top{ position:relative; z-index:1; padding-bottom: 10px; display:flex; gap:10px; align-items:flex-start; }
  .ticket-text{ flex:1; min-width:0; }
  .poster-thumb{
    width: 46px; height: 68px; object-fit: cover; border-radius: 6px;
    flex-shrink:0; border: 1px solid var(--line);
  }
  .ticket-bottom{ position:relative; z-index:1; padding-top: 10px; display:flex; justify-content:space-between; align-items:center; gap:8px; }

  .ticket.watched{ background: var(--card-torn); }
  .ticket.watched .title{ text-decoration: line-through; color: var(--muted); }
  .stamp{
    position:absolute; top: 8px; right: -28px;
    font-family:'Bebas Neue', sans-serif;
    font-size: 0.75rem; letter-spacing: 2px; color: var(--red);
    border: 2px solid var(--red); padding: 1px 26px;
    transform: rotate(18deg); opacity: 0.85; z-index: 2; pointer-events:none;
  }

  .title{ font-size: 1rem; font-weight: 600; color: var(--cream); line-height: 1.3; word-break: break-word; }
  .platform{
    display:inline-block; font-family:'JetBrains Mono', monospace; font-size: 0.62rem;
    letter-spacing: 0.5px; text-transform: uppercase; color: var(--gold);
    border: 1px solid rgba(227,178,60,0.4); padding: 4px 9px; border-radius: 12px;
    background: rgba(227,178,60,0.06); white-space:nowrap;
  }
  .platform.empty{ color: var(--muted); border-color: var(--line); background:none; }
  .row-btns{ display:flex; gap:4px; flex-shrink:0; }
  .icon-btn{
    background: none; border: none; cursor:pointer; color: var(--muted);
    font-size: 1.15rem; padding: 6px 8px; line-height:1;
  }
  .icon-btn.toggle{ color: var(--green); }
  .icon-btn.del{ color: var(--red); opacity:0.7; }
  .icon-btn.edit{ display:inline-block; transform: scaleX(-1); }
  .icon-btn.trailer{ color: #e05252; font-size: 0.95rem; }

  .empty-msg{
    font-family:'JetBrains Mono', monospace; color: var(--muted); font-size: 0.8rem;
    padding: 22px 4px; text-align:center; border: 1px dashed var(--line); border-radius: 10px;
  }

  /* FAB */
  .fab{
    position: fixed; right: 18px; bottom: calc(20px + var(--safe-bottom));
    width: 58px; height: 58px; border-radius: 50%;
    background: var(--red); color: var(--cream); border:none;
    font-size: 1.8rem; box-shadow: 0 6px 20px rgba(200,56,90,0.5);
    display:flex; align-items:center; justify-content:center;
    z-index: 30; cursor:pointer;
  }
  .fab:active{ transform: scale(0.94); }

  /* MODAL / SHEET */
  .modal-bg{
    display:none; position: fixed; inset:0; background: rgba(10,7,14,0.75);
    z-index: 50; align-items:flex-end; justify-content:center;
  }
  .modal-bg.open{ display:flex; }
  .modal{
    background: var(--bg-alt); border: 1px solid var(--line);
    border-radius: 18px 18px 0 0; padding: 22px 20px calc(22px + var(--safe-bottom));
    width: 100%; max-width: 480px;
    animation: slideUp .2s ease-out;
  }
  @keyframes slideUp{ from{ transform: translateY(30px); opacity:0; } to{ transform: translateY(0); opacity:1; } }
  .modal h3{ font-family:'Bebas Neue', sans-serif; letter-spacing: 1.5px; color: var(--gold); margin: 0 0 16px; font-size: 1.3rem; }
  .field{ margin-bottom: 14px; }
  .field label{ display:block; font-family:'JetBrains Mono', monospace; font-size: 0.62rem; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .field input, .field select{
    width: 100%; background: var(--card); border: 1px solid var(--line); color: var(--cream);
    padding: 12px 12px; border-radius: 8px; font-family: 'Space Grotesk', sans-serif; font-size: 16px;
  }
  .field input:focus, .field select:focus{ outline: 1px solid var(--gold); }
  .type-toggle{ display:flex; gap:8px; }
  .type-toggle button{
    flex:1; padding: 12px; border-radius: 8px; border: 1px solid var(--line);
    background: var(--card); color: var(--muted); font-family:'Space Grotesk'; font-size:0.9rem; cursor:pointer;
  }
  .type-toggle button.active{ border-color: var(--gold); color: var(--gold); background: rgba(227,178,60,0.08); }
  .modal-actions{ display:flex; gap:10px; margin-top: 18px; }
  .modal-actions button{
    flex:1; padding: 13px; border-radius: 8px; border:none; cursor:pointer;
    font-family:'JetBrains Mono', monospace; font-size: 0.75rem; letter-spacing:1px; text-transform:uppercase;
  }
  .btn-cancel{ background: transparent; border: 1px solid var(--line) !important; color: var(--muted); }
  .btn-save{ background: var(--gold); color: #201607; font-weight:600; }

  .imdb-preview{
    display:flex; gap:10px; align-items:flex-start;
    background: var(--card); border: 1px solid var(--line); border-radius: 8px;
    padding: 10px; font-family:'Space Grotesk', sans-serif;
  }
  .imdb-preview img{ width:44px; border-radius:4px; flex-shrink:0; }
  .imdb-preview .badge{
    display:inline-flex; align-items:center; gap:4px;
    font-family:'JetBrains Mono', monospace; font-size:0.75rem; color: var(--gold);
    background: rgba(227,178,60,0.1); border:1px solid rgba(227,178,60,0.35);
    padding: 2px 8px; border-radius: 10px; margin-bottom:4px;
  }
  .imdb-preview .actors{ font-size: 0.78rem; color: var(--muted); line-height:1.3; }
  .imdb-status{ font-family:'JetBrains Mono', monospace; font-size:0.72rem; color: var(--muted); }
  .imdb-status.err{ color: var(--red); }

  .dup-warning{
    margin-top: 8px; padding: 8px 12px; border-radius: 8px;
    background: rgba(227,178,60,0.1); border: 1px solid rgba(227,178,60,0.4);
    color: var(--gold); font-family:'JetBrains Mono', monospace; font-size: 0.68rem; line-height:1.4;
  }

  .dup-banner-link{
    display:inline-block; margin-top: 10px; font-family:'JetBrains Mono', monospace;
    font-size: 0.65rem; letter-spacing: 0.5px; color: var(--gold);
    background: rgba(227,178,60,0.1); border: 1px solid rgba(227,178,60,0.4);
    padding: 6px 14px; border-radius: 14px; cursor:pointer;
  }
  .dup-group{ border: 1px solid var(--line); border-radius: 10px; padding: 10px; }
  .dup-group-title{ font-family:'JetBrains Mono', monospace; font-size:0.68rem; color: var(--muted); margin-bottom:8px; }
  .dup-entry{ display:flex; align-items:center; justify-content:space-between; gap:8px; padding: 6px 0; border-top: 1px solid var(--line); }
  .dup-entry:first-child{ border-top:none; }
  .dup-entry .dup-entry-info{ font-size:0.85rem; color: var(--cream); }
  .dup-entry .dup-entry-date{ font-family:'JetBrains Mono', monospace; font-size:0.62rem; color: var(--muted); }
  .dup-entry button{
    background: rgba(200,56,90,0.12); border: 1px solid var(--red); color: var(--red);
    border-radius: 8px; padding: 6px 10px; font-size:0.7rem; cursor:pointer; flex-shrink:0;
  }

  .suggestions{
    position:absolute; left:0; right:0; top:100%; margin-top:4px;
    background: var(--card); border: 1px solid var(--line); border-radius: 10px;
    max-height: 240px; overflow-y:auto; z-index: 60; display:none;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .suggestions.open{ display:block; }
  .suggestion-item{
    display:flex; align-items:center; gap:10px; padding: 9px 12px; cursor:pointer;
    border-bottom: 1px solid var(--line);
  }
  .suggestion-item:last-child{ border-bottom:none; }
  .suggestion-item:active{ background: rgba(227,178,60,0.1); }
  .suggestion-item img{ width:30px; height:44px; object-fit:cover; border-radius:4px; flex-shrink:0; background: var(--bg); }
  .suggestion-item .s-info{ min-width:0; }
  .suggestion-item .s-title{ font-size:0.85rem; color: var(--cream); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .suggestion-item .s-year{ font-family:'JetBrains Mono', monospace; font-size:0.65rem; color: var(--muted); }
  .suggestion-loading{ padding: 10px 12px; font-family:'JetBrains Mono', monospace; font-size:0.7rem; color: var(--muted); }

  .imdb-badge{
    display:inline-flex; align-items:center; gap:3px;
    font-family:'JetBrains Mono', monospace; font-size: 0.62rem; color: var(--gold);
    text-decoration: none; border-bottom: 1px dotted rgba(227,178,60,0.5);
  }
  .actors-line{ font-family:'JetBrains Mono', monospace; font-size: 0.66rem; color: var(--muted); margin-top:2px; }
  .dates-line{ font-family:'JetBrains Mono', monospace; font-size: 0.6rem; color: #6b6178; margin-top:4px; }
  .genre-chips{ display:flex; flex-wrap:wrap; gap:4px; margin-top:4px; }
  .genre-chip{
    font-family:'JetBrains Mono', monospace; font-size: 0.58rem; letter-spacing:0.3px;
    color: var(--red); background: rgba(200,56,90,0.1); border: 1px solid rgba(200,56,90,0.3);
    padding: 2px 7px; border-radius: 8px; text-transform: uppercase;
  }
  .plot-line{
    font-size: 0.76rem; color: #b3a9c2; margin-top: 5px; line-height:1.35;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }

  .loading{ text-align:center; padding: 60px 20px; color: var(--muted); font-family:'JetBrains Mono', monospace; font-size:0.8rem; }
  .banner{
    margin: 12px 14px 0; padding: 10px 14px; border-radius: 8px;
    font-family:'JetBrains Mono', monospace; font-size: 0.7rem; text-align:center;
  }
  .banner.error{ border: 1px solid var(--red); background: rgba(200,56,90,0.12); color: var(--cream); }
</style>
</head>
<body>

  <div class="marquee">
    <div class="bulbs"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
    <h1>Cinemago</h1>
    <div class="sub" id="listSub">lo que vemos, y dónde verlo</div>
    <div class="live-dot"><span class="pulse"></span> en vivo, compartido</div>
    <div class="stats" id="stats"></div>
    <div id="dupBanner"></div>
  </div>

  <div class="search-bar">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Buscar título o actor...">
    <button id="clearSearch" class="clear-search" style="display:none;">✕</button>
  </div>

  <div class="controls">
    <button class="tab active" data-filter="todo">Todo</button>
    <button class="tab" data-filter="pendiente">Pendiente</button>
    <button class="tab" data-filter="visto">Vista</button>
    <select id="sortSelect" class="sort-select">
      <option value="recent">Recientes primero</option>
      <option value="old">Antiguos primero</option>
      <option value="az">A - Z</option>
      <option value="rating">Mejor calificados</option>
    </select>
  </div>

  <div id="banner"></div>
  <div id="loadingMsg" class="loading">Conectando con la cartelera…</div>

  <div id="content" style="display:none;">
    <div class="section">
      <h2>Películas <small id="movieCount"></small></h2>
      <div class="stack" id="movieGrid"></div>
    </div>
    <div class="section">
      <h2>Series &amp; Miniseries <small id="showCount"></small></h2>
      <div class="stack" id="showGrid"></div>
    </div>
  </div>

  <button class="fab" id="openAdd">+</button>

  <div class="modal-bg" id="modalBg">
    <div class="modal">
      <h3 id="modalTitle">Nuevo título</h3>
      <div class="field" style="position:relative;">
        <label>Título</label>
        <input type="text" id="fTitle" placeholder="Nombre de la película o serie" autocomplete="off">
        <div id="titleSuggestions" class="suggestions"></div>
        <div id="dupWarning"></div>
      </div>
      <div class="field">
        <label>Tipo</label>
        <div class="type-toggle">
          <button type="button" class="active" data-type="movie">Película</button>
          <button type="button" data-type="show">Serie</button>
        </div>
      </div>
      <div class="field">
        <label>Plataforma (opcional)</label>
        <input type="text" id="fPlatform" placeholder="Netflix, Disney+, HBO...">
      </div>
      <div class="field">
        <label>Info de IMDb (se busca sola al escribir el título)</label>
        <div style="display:flex; gap:8px;">
          <input type="text" id="fImdbQuery" placeholder="Ajustar título de búsqueda (opcional)">
          <button type="button" id="imdbSearchBtn" style="flex-shrink:0; background:var(--card); border:1px solid var(--line); color:var(--gold); border-radius:8px; padding:0 14px; font-size:1.1rem;">🔍</button>
        </div>
        <div id="imdbResult" style="margin-top:10px;"></div>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" id="cancelBtn">Cancelar</button>
        <button class="btn-save" id="saveBtn">Guardar</button>
      </div>
    </div>
  </div>

  <div class="modal-bg" id="dupModalBg">
    <div class="modal">
      <h3>Posibles duplicados</h3>
      <div id="dupList" style="display:flex; flex-direction:column; gap:14px; max-height:60vh; overflow-y:auto;"></div>
      <div class="modal-actions">
        <button class="btn-cancel" id="dupCloseBtn">Cerrar</button>
      </div>
    </div>
  </div>

  {t:'Seeking Persephone', type:'show', platform:'', watched:false},
  {t:'The Cleaner (El Limpiador)', type:'show', platform:'Disney+', watched:false},
  {t:'Empire Waist', type:'show', platform:'', watched:true},
  {t:'The Unicorn', type:'show', platform:'', watched:false},
  {t:'¿De quién huimos, mamá?', type:'show', platform:'', watched:false},
];

let app, db;
let items = [];
let currentFilter = 'todo';
let searchQuery = '';
let editingId = null;
let modalType = 'movie';

function showBanner(msg, type){
  const el = document.getElementById('banner');
  el.innerHTML = `<div class="banner ${type||'error'}">${msg}</div>`;
}
function clearBanner(){ document.getElementById('banner').innerHTML = ''; }

function escapeHTML(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function formatDate(ts){
  if(!ts || typeof ts.toDate !== 'function') return '';
  return ts.toDate().toLocaleDateString('es-CL', { day:'2-digit', month:'2-digit', year:'numeric' });
}

const GENRE_ES = {
  'Action':'Acción','Adventure':'Aventura','Animation':'Animación','Biography':'Biografía',
  'Comedy':'Comedia','Crime':'Crimen','Documentary':'Documental','Drama':'Drama',
  'Family':'Familiar','Fantasy':'Fantasía','Film-Noir':'Cine negro','History':'Histórica',
  'Horror':'Terror','Music':'Musical','Musical':'Musical','Mystery':'Misterio',
  'News':'Noticias','Reality-TV':'Reality','Romance':'Romance','Sci-Fi':'Ciencia ficción',
  'Sport':'Deporte','Talk-Show':'Talk show','Thriller':'Suspenso','War':'Bélica','Western':'Western'
};
function translateGenres(genreStr){
  return genreStr.split(',').map(g => g.trim()).filter(Boolean).map(g => GENRE_ES[g] || g);
}

async function init(){
  if(LIST_PARAM){
    document.getElementById('listSub').textContent = `lista de ${LIST_PARAM}`;
  }
  try{
    app = firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
  } catch(e){
    document.getElementById('loadingMsg').textContent = 'No se pudo conectar a la base de datos compartida.';
    return;
  }

  const col = db.collection(COLLECTION);

  // Seed once if empty (solo en la lista principal, sin ?lista=)
  if(!LIST_PARAM){
    try{
      const snap = await col.limit(1).get();
      if(snap.empty){
        const batch = db.batch();
        seedData.forEach(d => {
          const ref = col.doc();
          batch.set(ref, {...d, createdAt: firebase.firestore.FieldValue.serverTimestamp()});
        });
        await batch.commit();
      }
    } catch(e){
      // seeding failure is non-fatal; listener below will still try to attach
    }
  }

  col.orderBy('createdAt', 'asc').onSnapshot(
    (snapshot) => {
      items = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      document.getElementById('loadingMsg').style.display = 'none';
      document.getElementById('content').style.display = 'block';
      clearBanner();
      render();
    },
    (err) => {
      document.getElementById('loadingMsg').style.display = 'none';
      document.getElementById('content').style.display = 'block';
      showBanner('Sin conexión con la lista compartida en este momento. Revisa tu internet.', 'error');
    }
  );
}

function normalize(s){
  return String(s || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}

function matchesFilter(item){
  if(currentFilter === 'pendiente' && item.watched) return false;
  if(currentFilter === 'visto' && !item.watched) return false;
  if(searchQuery){
    const q = normalize(searchQuery);
    const inTitle = normalize(item.t).includes(q);
    const inActors = normalize(item.actors).includes(q);
    const inPlatform = normalize(item.platform).includes(q);
    if(!inTitle && !inActors && !inPlatform) return false;
  }
  return true;
}

function cardHTML(item){
  const platformHTML = item.platform
    ? `<span class="platform">${escapeHTML(item.platform)}</span>`
    : `<span class="platform empty">sin definir</span>`;
  const ratingHTML = item.imdbRating
    ? (item.imdbID
        ? `<a class="imdb-badge" href="https://www.imdb.com/title/${escapeHTML(item.imdbID)}/" target="_blank" rel="noopener">★ ${escapeHTML(item.imdbRating)}</a>`
        : `<span class="imdb-badge">★ ${escapeHTML(item.imdbRating)}</span>`)
    : '';
  const actorsHTML = item.actors
    ? `<div class="actors-line">${escapeHTML(item.actors)}</div>`
    : '';
  const posterHTML = item.poster
    ? `<img class="poster-thumb" src="${escapeHTML(item.poster)}" alt="" loading="lazy" onerror="this.style.display='none'">`
    : '';
  const addedDate = formatDate(item.createdAt);
  const watchedDate = formatDate(item.watchedAt);
  const datesHTML = (addedDate || watchedDate)
    ? `<div class="dates-line">${addedDate ? `Agregada ${addedDate}` : ''}${addedDate && watchedDate ? ' · ' : ''}${watchedDate ? `Vista ${watchedDate}` : ''}</div>`
    : '';
  const genreHTML = item.genre
    ? `<div class="genre-chips">${translateGenres(item.genre).map(g => `<span class="genre-chip">${escapeHTML(g)}</span>`).join('')}</div>`
    : '';
  const plotHTML = item.plot
    ? `<div class="plot-line">${escapeHTML(item.plot)}</div>`
    : '';
  return `
    <div class="ticket ${item.watched ? 'watched' : ''}" data-id="${item.id}">
      ${item.watched ? '<div class="stamp">VISTA</div>' : ''}
      <div class="ticket-top">
        ${posterHTML}
        <div class="ticket-text">
          <div class="title">${escapeHTML(item.t)} ${ratingHTML}</div>
          ${genreHTML}
          ${actorsHTML}
          ${plotHTML}
          ${datesHTML}
        </div>
      </div>
      <div class="perf"></div>
      <div class="ticket-bottom">
        ${platformHTML}
        <div class="row-btns">
          <button class="icon-btn trailer" title="Ver tráiler">▶</button>
          <button class="icon-btn toggle" title="Marcar">${item.watched ? '↺' : '✓'}</button>
          <button class="icon-btn edit" title="Editar">✎</button>
          <button class="icon-btn del" title="Eliminar">✕</button>
        </div>
      </div>
    </div>
  `;
}

let sortMode = 'recent';

function sortItems(list){
  const arr = [...list];
  if(sortMode === 'recent'){
    arr.reverse();
  } else if(sortMode === 'az'){
    arr.sort((a,b) => normalize(a.t).localeCompare(normalize(b.t)));
  } else if(sortMode === 'rating'){
    arr.sort((a,b) => (parseFloat(b.imdbRating) || -1) - (parseFloat(a.imdbRating) || -1));
  }
  // 'old' usa el orden original (createdAt ascendente, tal cual viene de Firestore)
  return arr;
}

function render(){
  const movies = sortItems(items.filter(i => i.type === 'movie' && matchesFilter(i)));
  const shows = sortItems(items.filter(i => i.type === 'show' && matchesFilter(i)));

  const movieGrid = document.getElementById('movieGrid');
  const showGrid = document.getElementById('showGrid');

  movieGrid.innerHTML = movies.length ? movies.map(cardHTML).join('') : `<div class="empty-msg">No hay películas en esta categoría.</div>`;
  showGrid.innerHTML = shows.length ? shows.map(cardHTML).join('') : `<div class="empty-msg">No hay series en esta categoría.</div>`;

  document.getElementById('movieCount').textContent = `${movies.length} de ${items.filter(i=>i.type==='movie').length}`;
  document.getElementById('showCount').textContent = `${shows.length} de ${items.filter(i=>i.type==='show').length}`;

  const total = items.length;
  const totalWatched = items.filter(i => i.watched).length;
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="num">${total}</div><div class="lbl">Títulos</div></div>
    <div class="stat"><div class="num">${totalWatched}</div><div class="lbl">Vistos</div></div>
    <div class="stat"><div class="num">${total - totalWatched}</div><div class="lbl">Pendientes</div></div>
  `;

  attachCardEvents();
  renderDupBanner();
}

function findDuplicateGroups(){
  const groups = {};
  items.forEach(item => {
    const key = item.type + '|' + normalize(item.t);
    if(!groups[key]) groups[key] = [];
    groups[key].push(item);
  });
  return Object.values(groups).filter(g => g.length > 1);
}

function renderDupBanner(){
  const box = document.getElementById('dupBanner');
  const groups = findDuplicateGroups();
  if(!groups.length){ box.innerHTML = ''; return; }
  const count = groups.length;
  box.innerHTML = `<span class="dup-banner-link" id="dupBannerBtn">⚠️ ${count} posible${count>1?'s':''} duplicado${count>1?'s':''} — revisar</span>`;
  document.getElementById('dupBannerBtn').onclick = openDupModal;
}

function openDupModal(){
  const groups = findDuplicateGroups();
  const list = document.getElementById('dupList');
  if(!groups.length){
    list.innerHTML = `<div class="empty-msg">No hay duplicados por ahora 🎉</div>`;
  } else {
    list.innerHTML = groups.map(group => `
      <div class="dup-group">
        <div class="dup-group-title">${escapeHTML(group[0].t)} (${group.length}) — ${group[0].type === 'show' ? 'serie' : 'película'}</div>
        ${group.map(item => `
          <div class="dup-entry" data-id="${item.id}">
            <div>
              <div class="dup-entry-info">${escapeHTML(item.t)}${item.platform ? ` · ${escapeHTML(item.platform)}` : ''}</div>
              <div class="dup-entry-date">${item.watched ? 'Vista' : 'Pendiente'}${formatDate(item.createdAt) ? ` · agregada ${formatDate(item.createdAt)}` : ''}</div>
            </div>
            <button class="dup-del-btn">Eliminar</button>
          </div>
        `).join('')}
      </div>
    `).join('');
    list.querySelectorAll('.dup-entry').forEach(el => {
      el.querySelector('.dup-del-btn').onclick = async () => {
        await deleteItem(el.dataset.id);
        openDupModal(); // refrescar la lista tras borrar
      };
    });
  }
  document.getElementById('dupModalBg').classList.add('open');
}

function attachCardEvents(){
  document.querySelectorAll('.ticket').forEach(el => {
    const id = el.dataset.id;
    el.querySelector('.toggle').onclick = () => toggleWatched(id);
    el.querySelector('.edit').onclick = () => openEdit(id);
    el.querySelector('.del').onclick = () => deleteItem(id);
    el.querySelector('.trailer').onclick = () => openTrailer(id);
  });
}

function openTrailer(id){
  const item = items.find(i => i.id === id);
  if(!item) return;
  const q = encodeURIComponent(`${item.t} trailer`);
  window.open(`https://www.youtube.com/results?search_query=${q}`, '_blank', 'noopener');
}

async function toggleWatched(id){
  const item = items.find(i => i.id === id);
  if(!item) return;
  const nowWatched = !item.watched;
  try{
    await db.collection(COLLECTION).doc(id).update({
      watched: nowWatched,
      watchedAt: nowWatched ? firebase.firestore.FieldValue.serverTimestamp() : null
    });
  } catch(e){
    showBanner('No se pudo actualizar. Intenta de nuevo.', 'error');
  }
}

async function deleteItem(id){
  try{
    await db.collection(COLLECTION).doc(id).delete();
  } catch(e){
    showBanner('No se pudo eliminar. Intenta de nuevo.', 'error');
  }
}

function openEdit(id){
  const item = items.find(i => i.id === id);
  if(!item) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = 'Editar título';
  document.getElementById('fTitle').value = item.t;
  document.getElementById('fPlatform').value = item.platform || '';
  document.getElementById('fImdbQuery').value = item.t;
  delete document.getElementById('fImdbQuery').dataset.touched;
  setModalType(item.type);
  imdbData = (item.imdbRating || item.actors) ? { imdbRating: item.imdbRating || '', actors: item.actors || '', poster: item.poster || '', imdbID: item.imdbID || '', genre: item.genre || '', plot: item.plot || '' } : null;
  renderImdbPreview(imdbData, imdbData ? null : '');
  document.getElementById('dupWarning').innerHTML = '';
  duplicateConfirmed = false;
  document.getElementById('modalBg').classList.add('open');
}

function openAdd(){
  editingId = null;
  document.getElementById('modalTitle').textContent = 'Nuevo título';
  document.getElementById('fTitle').value = '';
  document.getElementById('fPlatform').value = '';
  document.getElementById('fImdbQuery').value = '';
  delete document.getElementById('fImdbQuery').dataset.touched;
  setModalType('movie');
  imdbData = null;
  document.getElementById('imdbResult').innerHTML = '';
  document.getElementById('dupWarning').innerHTML = '';
  duplicateConfirmed = false;
  document.getElementById('saveBtn').textContent = 'Guardar';
  document.getElementById('modalBg').classList.add('open');
  setTimeout(() => document.getElementById('fTitle').focus(), 150);
}

function setModalType(type){
  modalType = type;
  document.querySelectorAll('.type-toggle button').forEach(b => {
    b.classList.toggle('active', b.dataset.type === type);
  });
}

function closeModal(){ document.getElementById('modalBg').classList.remove('open'); closeSuggestions(); }

function renderImdbPreview(data, errMsg, translating){
  const el = document.getElementById('imdbResult');
  if(errMsg && !translating){
    el.innerHTML = `<div class="imdb-status err">${escapeHTML(errMsg)}</div>`;
    return;
  }
  if(!data){ el.innerHTML = ''; return; }
  const genreLine = data.genre ? `<div class="actors" style="margin-top:2px;">${escapeHTML(translateGenres(data.genre).join(' · '))}</div>` : '';
  const plotLine = data.plot ? `<div class="actors" style="margin-top:5px; font-style:italic;">${escapeHTML(data.plot)}</div>` : '';
  const translatingLine = translating ? `<div class="imdb-status" style="margin-top:5px;">${escapeHTML(errMsg)}</div>` : '';
  el.innerHTML = `
    <div class="imdb-preview">
      ${data.poster ? `<img src="${escapeHTML(data.poster)}" alt="">` : ''}
      <div>
        <span class="badge">★ IMDb ${escapeHTML(data.imdbRating || '—')}</span>
        ${genreLine}
        <div class="actors">${escapeHTML(data.actors || 'Actores no disponibles')}</div>
        ${plotLine}
        ${translatingLine}
      </div>
    </div>
  `;
}

async function translateToSpanish(text){
  try{
    const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|es`);
    const data = await res.json();
    const translated = data && data.responseData && data.responseData.translatedText;
    if(!translated || data.responseStatus !== 200) return null;
    return translated;
  } catch(e){
    return null;
  }
}

let imdbSearchTimer = null;
function scheduleAutoSearch(){
  clearTimeout(imdbSearchTimer);
  const titleVal = document.getElementById('fTitle').value.trim();
  const queryEl = document.getElementById('fImdbQuery');
  if(!queryEl.dataset.touched){ queryEl.value = titleVal; }
  checkDuplicate(titleVal);
  if(!titleVal){
    renderImdbPreview(null, null);
    closeSuggestions();
    return;
  }
  imdbSearchTimer = setTimeout(() => fetchSuggestions(titleVal), 450);
}

let duplicateConfirmed = false;
function checkDuplicate(titleVal){
  duplicateConfirmed = false;
  document.getElementById('saveBtn').textContent = 'Guardar';
  const box = document.getElementById('dupWarning');
  const t = normalize(titleVal);
  if(!t){ box.innerHTML = ''; return; }
  const match = items.find(i => i.id !== editingId && normalize(i.t) === t);
  if(match){
    const dateStr = formatDate(match.createdAt);
    box.innerHTML = `<div class="dup-warning">⚠️ Ya tienes "${escapeHTML(match.t)}" en tu lista${dateStr ? ` (agregada ${dateStr})` : ''}. Si guardas, se agregará de todas formas como un título aparte.</div>`;
  } else {
    box.innerHTML = '';
  }
}

async function fetchSuggestions(query){
  const box = document.getElementById('titleSuggestions');
  box.innerHTML = `<div class="suggestion-loading">Buscando…</div>`;
  box.classList.add('open');
  const tmdbType = modalType === 'show' ? 'tv' : 'movie';
  try{
    const res = await fetch(`https://api.themoviedb.org/3/search/${tmdbType}?api_key=${TMDB_KEY}&language=es-419&query=${encodeURIComponent(query)}`);
    const data = await res.json();
    if(data.success === false || data.status_code){
      box.innerHTML = `<div class="suggestion-loading">Error de TMDb: ${escapeHTML(data.status_message || 'clave inválida o sin activar')} (código ${escapeHTML(String(data.status_code || res.status))})</div>`;
      return;
    }
    if(!data.results || !data.results.length){
      box.innerHTML = `<div class="suggestion-loading">Sin resultados. Puedes escribir el título tal cual y buscar manual abajo.</div>`;
      return;
    }
    box.innerHTML = data.results.slice(0, 8).map(item => {
      const title = item.title || item.name || '';
      const year = (item.release_date || item.first_air_date || '').slice(0,4);
      const poster = item.poster_path ? `${TMDB_IMG}${item.poster_path}` : '';
      return `
      <div class="suggestion-item" data-id="${item.id}" data-media="${tmdbType}" data-title="${escapeHTML(title)}">
        ${poster ? `<img src="${escapeHTML(poster)}" alt="">` : '<div style="width:30px;height:44px;flex-shrink:0;"></div>'}
        <div class="s-info">
          <div class="s-title">${escapeHTML(title)}</div>
          <div class="s-year">${escapeHTML(year)}</div>
        </div>
      </div>
    `;}).join('');
    box.querySelectorAll('.suggestion-item').forEach(el => {
      el.onclick = () => selectSuggestion(el.dataset.id, el.dataset.media, el.dataset.title);
    });
  } catch(e){
    box.innerHTML = `<div class="suggestion-loading">Error de conexión buscando sugerencias.</div>`;
  }
}

function closeSuggestions(){
  const box = document.getElementById('titleSuggestions');
  box.classList.remove('open');
  box.innerHTML = '';
}

async function selectSuggestion(tmdbId, mediaType, title){
  closeSuggestions();
  document.getElementById('fTitle').value = title;
  document.getElementById('fImdbQuery').value = title;
  checkDuplicate(title);
  renderImdbPreview(null, 'Cargando datos…');
  try{
    // 1. Obtener el imdb_id real desde TMDb
    const extRes = await fetch(`https://api.themoviedb.org/3/${mediaType}/${tmdbId}/external_ids?api_key=${TMDB_KEY}`);
    const extData = await extRes.json();
    const imdbID = extData.imdb_id || '';

    // 2. Obtener plataformas de streaming (Chile) desde TMDb
    let platformNames = [];
    try{
      const provRes = await fetch(`https://api.themoviedb.org/3/${mediaType}/${tmdbId}/watch/providers?api_key=${TMDB_KEY}`);
      const provData = await provRes.json();
      const cl = provData.results && provData.results.CL;
      if(cl && cl.flatrate){ platformNames = cl.flatrate.map(p => p.provider_name); }
    } catch(e2){ /* no bloquea si falla */ }

    if(platformNames.length){
      document.getElementById('fPlatform').value = platformNames.slice(0,3).join(', ');
    }

    if(!imdbID){
      renderImdbPreview(null, 'Se cargaron datos básicos, pero no se encontró el ID de IMDb para el rating.');
      imdbData = { imdbRating:'', actors:'', poster:'', imdbID:'', genre:'', plot:'' };
      return;
    }

    // 3. Traer rating, actores, género y sinopsis desde OMDb
    const res = await fetch(`https://www.omdbapi.com/?apikey=${OMDB_KEY}&i=${encodeURIComponent(imdbID)}`);
    const data = await res.json();
    if(data.Response === 'False'){
      renderImdbPreview(null, 'No se pudo cargar la info de este título.');
      return;
    }
    const rawPlot = data.Plot && data.Plot !== 'N/A' ? data.Plot : '';
    imdbData = {
      imdbRating: data.imdbRating && data.imdbRating !== 'N/A' ? data.imdbRating : '',
      actors: data.Actors && data.Actors !== 'N/A' ? data.Actors : '',
      poster: data.Poster && data.Poster !== 'N/A' ? data.Poster : '',
      imdbID: data.imdbID || imdbID,
      genre: data.Genre && data.Genre !== 'N/A' ? data.Genre : '',
      plot: rawPlot
    };
    renderImdbPreview(imdbData, null);
    if(rawPlot){
      renderImdbPreview(imdbData, 'Traduciendo resumen…', true);
      const translated = await translateToSpanish(rawPlot);
      if(translated) imdbData.plot = translated;
      renderImdbPreview(imdbData, null);
    }
  } catch(e){
    renderImdbPreview(null, 'Error de conexión al cargar el título.');
  }
}

async function searchImdb(){
  const q = document.getElementById('fImdbQuery').value.trim() || document.getElementById('fTitle').value.trim();
  if(!q){ renderImdbPreview(null, 'Escribe un título para buscar.'); return; }
  renderImdbPreview(null, 'Buscando…');
  const typeParam = modalType === 'show' ? 'series' : 'movie';
  try{
    const res = await fetch(`https://www.omdbapi.com/?apikey=${OMDB_KEY}&t=${encodeURIComponent(q)}&type=${typeParam}`);
    const data = await res.json();
    if(data.Response === 'False'){
      imdbData = null;
      renderImdbPreview(null, `No se encontró "${q}" en IMDb. Prueba con el título original en inglés.`);
      return;
    }
    const rawPlot = data.Plot && data.Plot !== 'N/A' ? data.Plot : '';
    imdbData = {
      imdbRating: data.imdbRating && data.imdbRating !== 'N/A' ? data.imdbRating : '',
      actors: data.Actors && data.Actors !== 'N/A' ? data.Actors : '',
      poster: data.Poster && data.Poster !== 'N/A' ? data.Poster : '',
      imdbID: data.imdbID || '',
      genre: data.Genre && data.Genre !== 'N/A' ? data.Genre : '',
      plot: rawPlot
    };
    renderImdbPreview(imdbData, null);

    if(rawPlot){
      renderImdbPreview(imdbData, 'Traduciendo resumen…', true);
      const translated = await translateToSpanish(rawPlot);
      if(translated) imdbData.plot = translated;
      renderImdbPreview(imdbData, null);
    }
  } catch(e){
    imdbData = null;
    renderImdbPreview(null, 'Error de conexión al buscar en IMDb.');
  }
}

async function saveModal(){
  const t = document.getElementById('fTitle').value.trim();
  if(!t) return;
  const platform = document.getElementById('fPlatform').value.trim();

  const match = !editingId ? items.find(i => normalize(i.t) === normalize(t)) : null;
  if(match && !duplicateConfirmed){
    duplicateConfirmed = true;
    const saveBtn = document.getElementById('saveBtn');
    saveBtn.textContent = 'Toca de nuevo para agregar igual';
    return;
  }

  if(!imdbData && t){
    clearTimeout(imdbSearchTimer);
    try{ await searchImdb(); } catch(e){ /* no bloquea el guardado */ }
  }

  const extra = imdbData ? {
    imdbRating: imdbData.imdbRating || '',
    actors: imdbData.actors || '',
    poster: imdbData.poster || '',
    imdbID: imdbData.imdbID || '',
    genre: imdbData.genre || '',
    plot: imdbData.plot || ''
  } : { imdbRating: '', actors: '', poster: '', imdbID: '', genre: '', plot: '' };

  try{
    if(editingId){
      await db.collection(COLLECTION).doc(editingId).update({ t, type: modalType, platform, ...extra });
    } else {
      await db.collection(COLLECTION).add({
        t, type: modalType, platform, watched: false, ...extra,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
    }
    closeModal();
  } catch(e){
    showBanner('No se pudo guardar. Revisa tu conexión e intenta de nuevo.', 'error');
  }
}

document.getElementById('openAdd').onclick = openAdd;
document.getElementById('cancelBtn').onclick = closeModal;
document.getElementById('saveBtn').onclick = saveModal;
document.getElementById('imdbSearchBtn').onclick = searchImdb;
document.getElementById('fTitle').addEventListener('input', scheduleAutoSearch);
document.getElementById('fImdbQuery').addEventListener('input', () => {
  document.getElementById('fImdbQuery').dataset.touched = '1';
  clearTimeout(imdbSearchTimer);
  imdbSearchTimer = setTimeout(searchImdb, 700);
});
document.getElementById('modalBg').onclick = (e) => {
  if(e.target.id === 'modalBg') closeModal();
  if(!e.target.closest('#fTitle') && !e.target.closest('#titleSuggestions')) closeSuggestions();
};
document.addEventListener('click', (e) => {
  if(!e.target.closest('#fTitle') && !e.target.closest('#titleSuggestions')) closeSuggestions();
});

document.getElementById('dupCloseBtn').onclick = () => document.getElementById('dupModalBg').classList.remove('open');
document.getElementById('dupModalBg').onclick = (e) => { if(e.target.id === 'dupModalBg') document.getElementById('dupModalBg').classList.remove('open'); };

document.getElementById('searchInput').addEventListener('input', (e) => {
  searchQuery = e.target.value;
  document.getElementById('clearSearch').style.display = searchQuery ? 'block' : 'none';
  render();
});
document.getElementById('clearSearch').onclick = () => {
  searchQuery = '';
  document.getElementById('searchInput').value = '';
  document.getElementById('clearSearch').style.display = 'none';
  render();
};
document.querySelectorAll('.type-toggle button').forEach(b => {
  b.onclick = () => setModalType(b.dataset.type);
});

document.querySelectorAll('.tab').forEach(tab => {
  tab.onclick = () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentFilter = tab.dataset.filter;
    render();
  };
});

document.getElementById('sortSelect').addEventListener('change', (e) => {
  sortMode = e.target.value;
  render();
});

init();
</script>
</body>
</html>
