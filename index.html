<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Cinemago</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Bungee&family=Lobster&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');

  :root{
    --bg: #17121f;
    --bg-alt: #1f1829;
    --card: #241c30;
    --card-torn: #1a1522;
    --gold: #e3b23c;
    --red: #c8385a;
    --green: #4caf7d;
    --cream: #f3ede2;
    --muted: #8d8299;
    --line: #3a2f47;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-top: env(safe-area-inset-top, 0px);
  }

  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  .auth-screen{
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:
      radial-gradient(circle at 20% 0%, rgba(200,56,90,0.12), transparent 45%),
      radial-gradient(circle at 80% 10%, rgba(227,178,60,0.08), transparent 40%),
      var(--bg);
    padding: 20px;
  }
  .auth-box{ text-align:center; max-width:320px; width:100%; }
  .google-btn{
    display:flex; align-items:center; justify-content:center; gap:10px;
    width:100%; padding: 13px; border-radius: 10px; border: 1px solid var(--line);
    background: #fff; color:#3c4043; font-family:'Space Grotesk', sans-serif; font-weight:600;
    font-size:0.9rem; cursor:pointer;
  }
  .google-btn:active{ transform: scale(0.98); }
  .auth-status{ margin-top:14px; font-family:'JetBrains Mono', monospace; font-size:0.7rem; color: var(--muted); min-height:1em; }

  .account-row{
    display:flex; align-items:center; justify-content:center; gap:8px; margin-top:12px;
    font-family:'JetBrains Mono', monospace; font-size:0.65rem; color: var(--muted);
  }
  .account-row img{ width:20px; height:20px; border-radius:50%; }
  .account-btn{
    background:transparent; border:1px solid var(--line); color: var(--muted);
    padding:4px 10px; border-radius:12px; font-family:'JetBrains Mono', monospace; font-size:0.62rem; cursor:pointer;
  }
  .account-btn:hover{ border-color: var(--gold); color: var(--gold); }

  .list-switch{ display:flex; gap:6px; flex-wrap:wrap; justify-content:center; margin-top:8px; }
  .list-chip{
    font-family:'JetBrains Mono', monospace; font-size:0.62rem; padding:5px 10px; border-radius:12px;
    border:1px solid var(--line); color: var(--muted); background:transparent; cursor:pointer;
  }
  .list-chip.active{ border-color:var(--gold); color:var(--gold); background:rgba(227,178,60,0.08); }


  html, body{ margin:0; padding:0; }

  body{
    background:
      radial-gradient(circle at 20% 0%, rgba(200,56,90,0.12), transparent 45%),
      radial-gradient(circle at 80% 10%, rgba(227,178,60,0.08), transparent 40%),
      var(--bg);
    color: var(--cream);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    padding-bottom: calc(90px + var(--safe-bottom));
    -webkit-user-select: none;
    user-select: none;
  }
  input, textarea{ user-select: text; -webkit-user-select: text; }

  /* MARQUEE HERO */
  .marquee{
    position: relative;
    padding: calc(24px + var(--safe-top)) 16px 24px;
    text-align: center;
    border-bottom: 3px dashed var(--line);
  }
  .marquee .bulbs{
    display:flex; justify-content:center; gap:8px; margin-bottom: 12px;
  }
  .marquee .bulbs span{
    width:6px; height:6px; border-radius:50%;
    background: var(--gold);
    box-shadow: 0 0 8px 2px rgba(227,178,60,0.7);
    animation: flicker 2.4s infinite ease-in-out;
  }
  .marquee .bulbs span:nth-child(odd){ animation-delay: 0.6s; }
  .marquee .bulbs span:nth-child(3n){ animation-delay: 1.2s; }
  @keyframes flicker{ 0%,100%{ opacity:1; } 50%{ opacity:0.35; } }
  .marquee h1{
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2rem, 9vw, 2.8rem);
    letter-spacing: 3px;
    margin: 0;
    text-shadow: 0 0 18px rgba(227,178,60,0.25);
  }
  .go-text{
    font-family: 'Bungee', sans-serif;
    font-size: 0.85em;
    background: linear-gradient(135deg, #ffd54a 0%, #e3b23c 35%, #c8385a 75%, #ff5478 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 1px;
    display: inline-block;
    transform: rotate(-8deg) translateY(-2px);
    margin-left: 4px;
    animation: goBounce 2.2s ease-in-out infinite;
    filter:
      drop-shadow(1px 1px 0 #1a1523)
      drop-shadow(-1px -1px 0 #1a1523)
      drop-shadow(0 0 10px rgba(227,178,60,0.6));
  }
  @keyframes goBounce{
    0%, 100%{ transform: rotate(-8deg) translateY(-2px) scale(1); }
    50%{ transform: rotate(-4deg) translateY(-6px) scale(1.08); }
  }
  @media (prefers-reduced-motion: reduce){
    .go-text{ animation: none; }
  }
  .marquee .sub{
    font-family: 'JetBrains Mono', monospace;
    color: var(--muted);
    font-size: 0.7rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 12px;
  }
  .live-dot{
    display:inline-flex; align-items:center; gap:5px;
    font-family:'JetBrains Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 1px;
    color: var(--green);
    text-transform: uppercase;
    margin-top: 10px;
  }
  .live-dot .pulse{
    width:6px; height:6px; border-radius:50%; background: var(--green);
    animation: pulse 1.6s infinite;
  }
  @keyframes pulse{ 0%,100%{ opacity:1; } 50%{ opacity:0.3; } }

  .stats{ display:flex; justify-content:center; gap: 22px; margin-top: 16px; }
  .stat{ text-align:center; }
  .stat .num{ font-family:'Bebas Neue', sans-serif; font-size: 1.7rem; color: var(--gold); line-height:1; }
  .stat .lbl{ font-family:'JetBrains Mono', monospace; font-size: 0.58rem; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }

  /* SEARCH */
  .search-bar{
    position: relative;
    background: var(--bg);
    padding: 14px 14px 0;
  }
  .search-icon{
    position:absolute; left: 28px; top: 50%; transform: translateY(-50%);
    font-size:0.85rem; opacity:0.6; pointer-events:none;
  }
  .search-bar input{
    width:100%; background: var(--card); border: 1px solid var(--line); color: var(--cream);
    padding: 11px 36px 11px 34px; border-radius: 22px; font-family:'Space Grotesk', sans-serif; font-size: 16px;
  }
  .search-bar input:focus{ outline: 1px solid var(--gold); }
  .clear-search{
    position:absolute; right: 26px; top: 50%; transform: translateY(-50%);
    background:none; border:none; color: var(--muted); font-size: 1rem; cursor:pointer; padding:6px;
  }

  /* CONTROLS */
  .controls{
    position: sticky; top:0; z-index: 20;
    background: rgba(23,18,31,0.92);
    backdrop-filter: blur(8px);
    padding: 10px 14px;
    display:flex; gap:8px; overflow-x:auto;
    border-bottom: 1px solid var(--line);
    scrollbar-width: none;
  }
  .controls::-webkit-scrollbar{ display:none; }
  .tab{
    flex-shrink:0;
    font-family:'JetBrains Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    background: transparent;
    border: 1px solid var(--line);
    color: var(--muted);
    padding: 9px 14px;
    border-radius: 20px;
    cursor: pointer;
  }
  .tab.active{ border-color: var(--gold); color: var(--gold); background: rgba(227,178,60,0.08); }
  .sort-select{
    flex-shrink:0; margin-left:auto;
    font-family:'JetBrains Mono', monospace; font-size: 0.65rem; letter-spacing:0.5px;
    background: transparent; border: 1px solid var(--line); color: var(--muted);
    padding: 8px 10px; border-radius: 20px;
  }

  /* SECTIONS */
  .section{ padding: 18px 14px 0; }
  .section h2{
    font-family:'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 1.5px;
    color: var(--gold);
    border-bottom: 1px solid var(--line);
    padding-bottom: 6px;
    margin: 0 0 12px;
    display:flex; justify-content:space-between; align-items:baseline;
  }
  .section h2 small{ font-family:'JetBrains Mono', monospace; font-size: 0.62rem; color: var(--muted); }
  .stack{ display:flex; flex-direction:column; gap: 12px; margin-bottom: 6px; }

  /* TICKET CARD */
  .ticket{
    position: relative;
    background: var(--card);
    border-radius: 10px;
    padding: 14px 14px 12px;
    display:flex; flex-direction:column; gap:6px;
    border: 1px solid var(--line);
    overflow: hidden;
  }
  .ticket::before, .ticket::after{
    content:""; position:absolute; width: 16px; height: 16px;
    background: var(--bg); border-radius: 50%; top: 50%; transform: translateY(-50%);
  }
  .ticket::before{ left: -8px; }
  .ticket::after{ right: -8px; }
  .ticket .perf{ position:absolute; left:0; right:0; top:50%; border-top: 2px dashed var(--line); }
  .ticket-top{ position:relative; z-index:1; padding-bottom: 10px; display:flex; gap:10px; align-items:flex-start; }
  .ticket-text{ flex:1; min-width:0; }
  .poster-thumb{
    width: 46px; height: 68px; object-fit: cover; border-radius: 6px;
    flex-shrink:0; border: 1px solid var(--line);
  }
  .ticket-bottom{ position:relative; z-index:1; padding-top: 10px; display:flex; flex-wrap:wrap; justify-content:space-between; align-items:center; gap:8px; }

  .ticket.watched{ background: var(--card-torn); }
  .ticket.watched .title{ text-decoration: line-through; color: var(--muted); }
  .stamp{
    position:absolute; top: 8px; right: -28px;
    font-family:'Bebas Neue', sans-serif;
    font-size: 0.75rem; letter-spacing: 2px; color: var(--red);
    border: 2px solid var(--red); padding: 1px 26px;
    transform: rotate(18deg); opacity: 0.85; z-index: 2; pointer-events:none;
  }

  .title{ font-size: 1rem; font-weight: 600; color: var(--cream); line-height: 1.3; word-break: break-word; }
  .platform{
    display:inline-block; font-family:'JetBrains Mono', monospace; font-size: 0.62rem;
    letter-spacing: 0.5px; text-transform: uppercase; color: var(--gold);
    border: 1px solid rgba(227,178,60,0.4); padding: 4px 9px; border-radius: 12px;
    background: rgba(227,178,60,0.06); white-space:nowrap;
    max-width: 100%; overflow:hidden; text-overflow:ellipsis;
  }
  .row-btns{ display:flex; gap:4px; flex-shrink:0; margin-left:auto; }
  .platform.empty{ color: var(--muted); border-color: var(--line); background:none; }
  .icon-btn{
    background: none; border: none; cursor:pointer; color: var(--muted);
    font-size: 1.15rem; padding: 6px 8px; line-height:1;
  }
  .icon-btn.toggle{ color: var(--green); }
  .icon-btn.del{ color: var(--red); opacity:0.7; }
  .icon-btn.edit{ display:inline-block; transform: scaleX(-1); }
  .icon-btn.trailer{ color: #e05252; font-size: 0.95rem; }

  .rec-subtitle{
    font-family:'JetBrains Mono', monospace; font-size:0.65rem; letter-spacing:1px;
    text-transform:uppercase; color: var(--muted); margin: 14px 0 8px;
  }
  .rec-row{ display:flex; gap:12px; overflow-x:auto; padding-bottom:6px; scrollbar-width:none; }
  .rec-row::-webkit-scrollbar{ display:none; }
  .rec-card{
    flex-shrink:0; width: 118px; background: var(--card); border:1px solid var(--line);
    border-radius:10px; overflow:hidden; position:relative;
  }
  .rec-card img{ width:100%; height:170px; object-fit:cover; display:block; background: var(--bg); }
  .rec-card .rec-info{ padding: 7px 8px 9px; }
  .rec-card .rec-title{ font-size:0.72rem; color: var(--cream); line-height:1.25; max-height:2.5em; overflow:hidden; }
  .rec-card .rec-rating{ font-family:'JetBrains Mono', monospace; font-size:0.62rem; color: var(--gold); margin-top:4px; }
  .rec-card .rec-add{
    position:absolute; top:6px; right:6px; width:26px; height:26px; border-radius:50%;
    background: rgba(23,18,31,0.85); border: 1px solid var(--gold); color: var(--gold);
    font-size:1rem; line-height:1; cursor:pointer; display:flex; align-items:center; justify-content:center;
  }
  .rec-card .rec-add.added{ background: var(--green); border-color: var(--green); color:#0b1f14; }
  .rec-genre-filter{ display:flex; gap:6px; overflow-x:auto; padding: 8px 0 10px; scrollbar-width:none; }
  .rec-genre-filter::-webkit-scrollbar{ display:none; }
  .rec-genre-chip{
    flex-shrink:0; font-family:'JetBrains Mono', monospace; font-size:0.65rem; letter-spacing:0.5px;
    text-transform:uppercase; background:transparent; border:1px solid var(--line); color: var(--muted);
    padding: 6px 12px; border-radius:14px; cursor:pointer;
  }
  .rec-genre-chip.active{ border-color: var(--gold); color: var(--gold); background: rgba(227,178,60,0.08); }
  .rec-card .rec-dismiss{
    position:absolute; top:6px; left:6px; width:22px; height:22px; border-radius:50%;
    background: rgba(23,18,31,0.85); border: 1px solid var(--muted); color: var(--muted);
    font-size:0.7rem; line-height:1; cursor:pointer; display:flex; align-items:center; justify-content:center;
  }
  .rec-card .rec-dismiss:hover{ border-color: var(--red); color: var(--red); }

  .rec-loading{
    font-family:'JetBrains Mono', monospace; font-size:0.72rem; color: var(--muted);
    padding: 10px 4px;
  }

  .empty-msg{
    font-family:'JetBrains Mono', monospace; color: var(--muted); font-size: 0.8rem;
    padding: 22px 4px; text-align:center; border: 1px dashed var(--line); border-radius: 10px;
  }

  /* FAB */
  .fab{
    position: fixed; right: 18px; bottom: calc(20px + var(--safe-bottom));
    width: 58px; height: 58px; border-radius: 50%;
    background: var(--red); color: var(--cream); border:none;
    font-size: 1.8rem; box-shadow: 0 6px 20px rgba(200,56,90,0.5);
    display:flex; align-items:center; justify-content:center;
    z-index: 30; cursor:pointer;
  }
  .fab:active{ transform: scale(0.94); }

  /* MODAL / SHEET */
  .modal-bg{
    display:none; position: fixed; inset:0; background: rgba(10,7,14,0.75);
    z-index: 50; align-items:flex-end; justify-content:center;
  }
  .modal-bg.open{ display:flex; }
  .modal{
    background: var(--bg-alt); border: 1px solid var(--line);
    border-radius: 18px 18px 0 0; padding: 22px 20px calc(22px + var(--safe-bottom));
    width: 100%; max-width: 480px;
    animation: slideUp .2s ease-out;
  }
  @keyframes slideUp{ from{ transform: translateY(30px); opacity:0; } to{ transform: translateY(0); opacity:1; } }
  .modal h3{ font-family:'Bebas Neue', sans-serif; letter-spacing: 1.5px; color: var(--gold); margin: 0 0 16px; font-size: 1.3rem; }
  .field{ margin-bottom: 14px; }
  .field label{ display:block; font-family:'JetBrains Mono', monospace; font-size: 0.62rem; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .field input, .field select{
    width: 100%; background: var(--card); border: 1px solid var(--line); color: var(--cream);
    padding: 12px 12px; border-radius: 8px; font-family: 'Space Grotesk', sans-serif; font-size: 16px;
  }
  .field input:focus, .field select:focus{ outline: 1px solid var(--gold); }
  .type-toggle{ display:flex; gap:8px; }
  .type-toggle button{
    flex:1; padding: 12px; border-radius: 8px; border: 1px solid var(--line);
    background: var(--card); color: var(--muted); font-family:'Space Grotesk'; font-size:0.9rem; cursor:pointer;
  }
  .type-toggle button.active{ border-color: var(--gold); color: var(--gold); background: rgba(227,178,60,0.08); }
  .modal-actions{ display:flex; gap:10px; margin-top: 18px; }
  .modal-actions button{
    flex:1; padding: 13px; border-radius: 8px; border:none; cursor:pointer;
    font-family:'JetBrains Mono', monospace; font-size: 0.75rem; letter-spacing:1px; text-transform:uppercase;
  }
  .btn-cancel{ background: transparent; border: 1px solid var(--line) !important; color: var(--muted); }
  .btn-save{ background: var(--gold); color: #201607; font-weight:600; }

  .imdb-preview{
    display:flex; gap:10px; align-items:flex-start;
    background: var(--card); border: 1px solid var(--line); border-radius: 8px;
    padding: 10px; font-family:'Space Grotesk', sans-serif;
  }
  .imdb-preview img{ width:44px; border-radius:4px; flex-shrink:0; }
  .imdb-preview .badge{
    display:inline-flex; align-items:center; gap:4px;
    font-family:'JetBrains Mono', monospace; font-size:0.75rem; color: var(--gold);
    background: rgba(227,178,60,0.1); border:1px solid rgba(227,178,60,0.35);
    padding: 2px 8px; border-radius: 10px; margin-bottom:4px;
  }
  .imdb-preview .actors{ font-size: 0.78rem; color: var(--muted); line-height:1.3; }
  .imdb-status{ font-family:'JetBrains Mono', monospace; font-size:0.72rem; color: var(--muted); }
  .imdb-status.err{ color: var(--red); }

  .dup-warning{
    margin-top: 8px; padding: 8px 12px; border-radius: 8px;
    background: rgba(227,178,60,0.1); border: 1px solid rgba(227,178,60,0.4);
    color: var(--gold); font-family:'JetBrains Mono', monospace; font-size: 0.68rem; line-height:1.4;
  }

  .dup-banner-link{
    display:inline-block; margin-top: 10px; font-family:'JetBrains Mono', monospace;
    font-size: 0.65rem; letter-spacing: 0.5px; color: var(--gold);
    background: rgba(227,178,60,0.1); border: 1px solid rgba(227,178,60,0.4);
    padding: 6px 14px; border-radius: 14px; cursor:pointer;
  }
  .dup-group{ border: 1px solid var(--line); border-radius: 10px; padding: 10px; }
  .dup-group-title{ font-family:'JetBrains Mono', monospace; font-size:0.68rem; color: var(--muted); margin-bottom:8px; }
  .dup-entry{ display:flex; align-items:center; justify-content:space-between; gap:8px; padding: 6px 0; border-top: 1px solid var(--line); }
  .dup-entry:first-child{ border-top:none; }
  .dup-entry .dup-entry-info{ font-size:0.85rem; color: var(--cream); }
  .dup-entry .dup-entry-date{ font-family:'JetBrains Mono', monospace; font-size:0.62rem; color: var(--muted); }
  .dup-entry button{
    background: rgba(200,56,90,0.12); border: 1px solid var(--red); color: var(--red);
    border-radius: 8px; padding: 6px 10px; font-size:0.7rem; cursor:pointer; flex-shrink:0;
  }

  .suggestions{
    position:absolute; left:0; right:0; top:100%; margin-top:4px;
    background: var(--card); border: 1px solid var(--line); border-radius: 10px;
    max-height: 240px; overflow-y:auto; z-index: 60; display:none;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .suggestions.open{ display:block; }
  .suggestion-item{
    display:flex; align-items:center; gap:10px; padding: 9px 12px; cursor:pointer;
    border-bottom: 1px solid var(--line);
  }
  .suggestion-item:last-child{ border-bottom:none; }
  .suggestion-item:active{ background: rgba(227,178,60,0.1); }
  .suggestion-item img{ width:30px; height:44px; object-fit:cover; border-radius:4px; flex-shrink:0; background: var(--bg); }
  .suggestion-item .s-info{ min-width:0; }
  .suggestion-item .s-title{ font-size:0.85rem; color: var(--cream); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .suggestion-item .s-year{ font-family:'JetBrains Mono', monospace; font-size:0.65rem; color: var(--muted); }
  .suggestion-loading{ padding: 10px 12px; font-family:'JetBrains Mono', monospace; font-size:0.7rem; color: var(--muted); }

  .imdb-badge{
    display:inline-flex; align-items:center; gap:3px;
    font-family:'JetBrains Mono', monospace; font-size: 0.62rem; color: var(--gold);
    text-decoration: none; border-bottom: 1px dotted rgba(227,178,60,0.5);
  }
  .actors-line{ font-family:'JetBrains Mono', monospace; font-size: 0.66rem; color: var(--muted); margin-top:2px; }
  .dates-line{ font-family:'JetBrains Mono', monospace; font-size: 0.6rem; color: #6b6178; margin-top:4px; }
  .genre-chips{ display:flex; flex-wrap:wrap; gap:4px; margin-top:4px; }
  .genre-chip{
    font-family:'JetBrains Mono', monospace; font-size: 0.58rem; letter-spacing:0.3px;
    color: var(--red); background: rgba(200,56,90,0.1); border: 1px solid rgba(200,56,90,0.3);
    padding: 2px 7px; border-radius: 8px; text-transform: uppercase;
  }
  .plot-line{
    font-size: 0.76rem; color: #b3a9c2; margin-top: 5px; line-height:1.35;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }

  .loading{ text-align:center; padding: 60px 20px; color: var(--muted); font-family:'JetBrains Mono', monospace; font-size:0.8rem; }
  .banner{
    margin: 12px 14px 0; padding: 10px 14px; border-radius: 8px;
    font-family:'JetBrains Mono', monospace; font-size: 0.7rem; text-align:center;
  }
  .banner.error{ border: 1px solid var(--red); background: rgba(200,56,90,0.12); color: var(--cream); }
</style>
</head>
<body>

  <div id="authScreen" class="auth-screen">
    <div class="auth-box">
      <h1 style="font-family:'Bebas Neue', sans-serif; font-size:2.4rem; letter-spacing:2px; color:var(--gold); margin:0 0 6px;">Cinemago</h1>

async function resolveUserList(){
  const uid = currentUser.uid;

  // 1. ¿Viene de un link de invitación? Únete a esa lista si no eres miembro aún.
  if(INVITE_PARAM){
    try{
      const listRef = db.collection('cinemago_lists').doc(INVITE_PARAM);
      const listSnap = await listRef.get();
      if(listSnap.exists){
        const data = listSnap.data();
        if(!(data.members || []).includes(uid)){
          await listRef.update({ members: firebase.firestore.FieldValue.arrayUnion(uid) });
        }
        currentListId = INVITE_PARAM;
        await loadMyLists();
        startListener();
        return;
      }
    } catch(e){ /* si falla, seguimos con el flujo normal */ }
  }

  // 2. ¿Ya tiene listas propias?
  await loadMyLists();
  if(myLists.length){
    currentListId = myLists[0].id;
    startListener();
    return;
  }

  // 3. Sin listas: ¿viene de un link antiguo (?lista=) para importar?
  if(LEGACY_LIST_PARAM){
    document.getElementById('loadingMsg').innerHTML = `Migrando tu lista anterior ("${escapeHTML(LEGACY_LIST_PARAM)}")…`;
    await createListForUser(`Lista de ${LEGACY_LIST_PARAM}`, `cinemago_items_${LEGACY_LIST_PARAM}`);
  } else {
    document.getElementById('loadingMsg').innerHTML = 'Preparando tu lista…';
    await createListForUser('Mi lista', 'cinemago_items');
  }
  await loadMyLists();
  startListener();
}

async function createListForUser(name, legacyCollectionName){
  const uid = currentUser.uid;
  const listRef = db.collection('cinemago_lists').doc();
  await listRef.set({
    name, ownerId: uid, members: [uid],
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  });
  currentListId = listRef.id;

  // Intentar migrar datos de la colección antigua (si existe y tiene datos)
  let migrated = false;
  try{
    const legacySnap = await db.collection(legacyCollectionName).get();
    if(!legacySnap.empty){
      const batch = db.batch();
      legacySnap.forEach(doc => {
        const ref = itemsCol().doc();
        batch.set(ref, doc.data());
      });
      await batch.commit();
      migrated = true;
    }
  } catch(e){ /* si falla la migración, seguimos igual */ }

  // Si no había nada que migrar (usuario nuevo de verdad), sembramos la lista inicial
  if(!migrated){
    const batch = db.batch();
    seedData.forEach(d => {
      const ref = itemsCol().doc();
      batch.set(ref, {...d, createdAt: firebase.firestore.FieldValue.serverTimestamp()});
    });
    await batch.commit();
  }
}

async function loadMyLists(){
  const uid = currentUser.uid;

    const snap = await db.collection('cinemago_lists').where('members', 'array-contains', uid).get();
    myLists = snap.docs.map(d => ({ id: d.id, name: d.data().name || 'Mi lista', isOwner: d.data().ownerId === uid }));
  } catch(e){
    myLists = currentListId ? [{ id: currentListId, name: 'Mi lista', isOwner: true }] : [];
  }
}

function normalize(s){
  return String(s || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}

function matchesFilter(item){
  if(currentFilter === 'pendiente' && item.watched) return false;
  if(currentFilter === 'visto' && !item.watched) return false;
  if(searchQuery){
    const q = normalize(searchQuery);
    const inTitle = normalize(item.t).includes(q);
    const inActors = normalize(item.actors).includes(q);
    const inPlatform = normalize(item.platform).includes(q);
    if(!inTitle && !inActors && !inPlatform) return false;
  }
  return true;
}

function cardHTML(item){
  const platformHTML = item.platform
    ? `<span class="platform">${escapeHTML(item.platform)}</span>`
    : `<span class="platform empty">sin definir</span>`;
  const ratingHTML = item.imdbRating
    ? (item.imdbID
        ? `<a class="imdb-badge" href="https://www.imdb.com/title/${escapeHTML(item.imdbID)}/" target="_blank" rel="noopener">★ ${escapeHTML(item.imdbRating)}</a>`
        : `<span class="imdb-badge">★ ${escapeHTML(item.imdbRating)}</span>`)
    : '';
  const actorsHTML = item.actors
    ? `<div class="actors-line">${escapeHTML(item.actors)}</div>`
    : '';
  const posterHTML = item.poster
    ? `<img class="poster-thumb" src="${escapeHTML(item.poster)}" alt="" loading="lazy" onerror="this.style.display='none'">`
    : '';
  const addedDate = formatDate(item.createdAt);
  const watchedDate = formatDate(item.watchedAt);
  const datesHTML = (addedDate || watchedDate)
    ? `<div class="dates-line">${addedDate ? `Agregada ${addedDate}` : ''}${addedDate && watchedDate ? ' · ' : ''}${watchedDate ? `Vista ${watchedDate}` : ''}</div>`
    : '';
  const genreHTML = item.genre
    ? `<div class="genre-chips">${translateGenres(item.genre).map(g => `<span class="genre-chip">${escapeHTML(g)}</span>`).join('')}</div>`
    : '';
  const plotHTML = item.plot
    ? `<div class="plot-line">${escapeHTML(item.plot)}</div>`
    : '';
  return `
    <div class="ticket ${item.watched ? 'watched' : ''}" data-id="${item.id}">
      ${item.watched ? '<div class="stamp">VISTA</div>' : ''}
      <div class="ticket-top">
        ${posterHTML}
        <div class="ticket-text">
          <div class="title">${escapeHTML(item.t)} ${ratingHTML}</div>
          ${genreHTML}
          ${actorsHTML}
          ${plotHTML}
          ${datesHTML}
        </div>
      </div>
      <div class="perf"></div>
      <div class="ticket-bottom">
        ${platformHTML}
        <div class="row-btns">
          <button class="icon-btn trailer" title="Ver tráiler">▶</button>
          <button class="icon-btn toggle" title="Marcar">${item.watched ? '↺' : '✓'}</button>
          <button class="icon-btn edit" title="Editar">✎</button>
          <button class="icon-btn del" title="Eliminar">✕</button>
        </div>
      </div>
    </div>
  `;
}

let sortMode = 'recent';

function sortItems(list){
  const arr = [...list];
  if(sortMode === 'recent'){
    arr.reverse();
  } else if(sortMode === 'az'){
    arr.sort((a,b) => normalize(a.t).localeCompare(normalize(b.t)));
  } else if(sortMode === 'rating'){
    arr.sort((a,b) => (parseFloat(b.imdbRating) || -1) - (parseFloat(a.imdbRating) || -1));
  }
  // 'old' usa el orden original (createdAt ascendente, tal cual viene de Firestore)
  return arr;
}

function render(){
  const movies = sortItems(items.filter(i => i.type === 'movie' && matchesFilter(i)));
  const shows = sortItems(items.filter(i => i.type === 'show' && matchesFilter(i)));

  const movieGrid = document.getElementById('movieGrid');
  const showGrid = document.getElementById('showGrid');

  movieGrid.innerHTML = movies.length ? movies.map(cardHTML).join('') : `<div class="empty-msg">No hay películas en esta categoría.</div>`;
  showGrid.innerHTML = shows.length ? shows.map(cardHTML).join('') : `<div class="empty-msg">No hay series en esta categoría.</div>`;

  document.getElementById('movieCount').textContent = `${movies.length} de ${items.filter(i=>i.type==='movie').length}`;
  document.getElementById('showCount').textContent = `${shows.length} de ${items.filter(i=>i.type==='show').length}`;

  const total = items.length;

  document.getElementById('stats').innerHTML = `

  `;

  attachCardEvents();
  renderDupBanner();
  maybeLoadRecommendations();
}

function findDuplicateGroups(){
  const groups = {};
  items.forEach(item => {
    const key = item.type + '|' + normalize(item.t);
    if(!groups[key]) groups[key] = [];
    groups[key].push(item);
  });
  return Object.values(groups).filter(g => g.length > 1);
}

function renderDupBanner(){
  const box = document.getElementById('dupBanner');
  const groups = findDuplicateGroups();
  if(!groups.length){ box.innerHTML = ''; return; }
  const count = groups.length;
  box.innerHTML = `<span class="dup-banner-link" id="dupBannerBtn">⚠️ ${count} posible${count>1?'s':''} duplicado${count>1?'s':''} — revisar</span>`;

}

async function maybeLoadRecommendations(){
  const watched = items.filter(i => i.watched && i.imdbID);
  const section = document.getElementById('recSection');
  if(watched.length < 2){
    section.style.display = 'none';
    return;
  }
  const signature = watched.map(i => i.id).sort().join(',');
  if(signature === recsLoadedFor) return; // ya cargadas para este mismo conjunto de vistos
  recsLoadedFor = signature;
  section.style.display = 'block';
  await loadRecommendations(watched);

async function tmdbFromImdb(imdbID){
  try{
    const res = await fetch(`https://api.themoviedb.org/3/find/${imdbID}?api_key=${TMDB_KEY}&external_source=imdb_id`);
    const data = await res.json();
    if(data.movie_results && data.movie_results.length) return { id: data.movie_results[0].id, mediaType: 'movie' };
    if(data.tv_results && data.tv_results.length) return { id: data.tv_results[0].id, mediaType: 'tv' };
  } catch(e){ /* ignorar */ }
  return null;
}

async function getDismissedSet(){
  const dismissed = new Set();
  try{
    const cutoff = Date.now() - DISMISS_DAYS * 24 * 60 * 60 * 1000;
    const snap = await dismissedCol().get();
    snap.forEach(doc => {
      const d = doc.data();
      const ts = d.dismissedAt && d.dismissedAt.toMillis ? d.dismissedAt.toMillis() : 0;
      if(ts > cutoff) dismissed.add(doc.id); // sigue vigente el descarte
    });
  } catch(e){ /* si falla, simplemente no filtramos por descartados */ }
  return dismissed;
}

async function loadRecommendations(watched){
  document.getElementById('recStatus').textContent = '(buscando…)';
  document.getElementById('recMovies').innerHTML = `<div class="rec-loading">Buscando películas parecidas a lo que ya viste…</div>`;
  document.getElementById('recShows').innerHTML = `<div class="rec-loading">Buscando series parecidas…</div>`;

  const seedMovies = watched.filter(i => i.type === 'movie').sort((a,b) => (b.watchedAt?.seconds||0) - (a.watchedAt?.seconds||0)).slice(0, 6);
  const seedShows = watched.filter(i => i.type === 'show').sort((a,b) => (b.watchedAt?.seconds||0) - (a.watchedAt?.seconds||0)).slice(0, 6);

  const existingTitles = new Set(items.map(i => normalize(i.t)));
  const dismissed = await getDismissedSet();

  recRawPool.movie = await buildRecPool(seedMovies, 'movie', existingTitles, dismissed);
  recRawPool.tv = await buildRecPool(seedShows, 'tv', existingTitles, dismissed);

  document.getElementById('recStatus').textContent = '';
  renderGenreFilter();
  applyGenreFilterAndRender();
}

async function buildRecPool(seedItems, mediaType, existingTitles, dismissed){
  const pool = new Map();
  for(const seed of seedItems){
    const found = await tmdbFromImdb(seed.imdbID);
    if(!found || found.mediaType !== mediaType) continue;
    try{
      const res = await fetch(`https://api.themoviedb.org/3/${mediaType}/${found.id}/recommendations?api_key=${TMDB_KEY}&language=es-419`);
      const data = await res.json();
      (data.results || []).forEach(r => {
        const title = r.title || r.name || '';
        if(!title) return;
        if(existingTitles.has(normalize(title))) return; // ya está en la lista (vista o pendiente)
        if(dismissed.has(`${mediaType}_${r.id}`)) return; // descartada hace menos de 2 meses
        if(!pool.has(r.id)) pool.set(r.id, r);
      });
    } catch(e){ /* seguir con el próximo seed */ }
  }
  return [...pool.values()]
    .filter(r => (r.vote_count || 0) >= 20)
    .sort((a,b) => (b.vote_average||0) - (a.vote_average||0));
}

function renderGenreFilter(){
  const box = document.getElementById('recGenreFilter');
  const available = REC_GENRES.filter(g =>
    recRawPool.movie.some(r => g.movie && (r.genre_ids||[]).includes(g.movie)) ||
    recRawPool.tv.some(r => g.tv && (r.genre_ids||[]).includes(g.tv))
  );
  if(!available.length){ box.innerHTML = ''; return; }
  box.innerHTML = `<button class="rec-genre-chip ${!activeGenreFilter ? 'active' : ''}" data-genre="">Todo</button>` +
    available.map(g => `<button class="rec-genre-chip ${activeGenreFilter===g.label ? 'active':''}" data-genre="${escapeHTML(g.label)}">${escapeHTML(g.label)}</button>`).join('');
  box.querySelectorAll('.rec-genre-chip').forEach(chip => {
    chip.onclick = () => {
      activeGenreFilter = chip.dataset.genre || null;
      renderGenreFilter();
      applyGenreFilterAndRender();
    };
  });
}

function applyGenreFilterAndRender(){
  let movies = recRawPool.movie;
  let shows = recRawPool.tv;
  if(activeGenreFilter){
    const g = REC_GENRES.find(x => x.label === activeGenreFilter);
    movies = g && g.movie ? movies.filter(r => (r.genre_ids||[]).includes(g.movie)) : [];
    shows = g && g.tv ? shows.filter(r => (r.genre_ids||[]).includes(g.tv)) : [];
  }
  renderRecRow('recMovies', movies.slice(0, 20), 'movie', 'No encontré recomendaciones de películas nuevas por ahora.');
  renderRecRow('recShows', shows.slice(0, 20), 'tv', 'No encontré recomendaciones de series nuevas por ahora.');
}

function renderRecRow(containerId, pool, mediaType, emptyMsg){
  const el = document.getElementById(containerId);
  if(!pool.length){ el.innerHTML = `<div class="rec-loading">${escapeHTML(emptyMsg)}</div>`; return; }
  el.innerHTML = pool.map(r => {
    const title = r.title || r.name || '';
    const poster = r.poster_path ? `${TMDB_IMG.replace('w92','w185')}${r.poster_path}` : '';
    const rating = r.vote_average ? r.vote_average.toFixed(1) : '—';
    suggestionOverviews[r.id] = r.overview || '';
    return `
      <div class="rec-card" data-id="${r.id}" data-media="${mediaType}" data-title="${escapeHTML(title)}">
        ${poster ? `<img src="${escapeHTML(poster)}" alt="">` : `<div style="width:100%;height:170px;background:var(--bg);"></div>`}
        <button class="rec-dismiss" title="No me interesa">✕</button>
        <button class="rec-add" title="Agregar a mi lista">+</button>
        <div class="rec-info">
          <div class="rec-title">${escapeHTML(title)}</div>
          <div class="rec-rating">★ ${escapeHTML(rating)}</div>
        </div>
      </div>
    `;
  }).join('');
  el.querySelectorAll('.rec-card').forEach(card => {
    card.querySelector('.rec-add').onclick = async (e) => {
      const btn = e.currentTarget;
      if(btn.classList.contains('added')) return;
      btn.textContent = '…';
      await quickAddRecommendation(card.dataset.id, card.dataset.media, card.dataset.title);
      btn.textContent = '✓';
      btn.classList.add('added');
    };
    card.querySelector('.rec-dismiss').onclick = async () => {
      const id = card.dataset.id, media = card.dataset.media;
      card.style.opacity = '0.3'; card.style.pointerEvents = 'none';
      await dismissRecommendation(id, media);
      recRawPool[media] = recRawPool[media].filter(r => String(r.id) !== String(id));
      applyGenreFilterAndRender();
    };
  });
}

async function dismissRecommendation(tmdbId, mediaType){

    await dismissedCol().doc(`${mediaType}_${tmdbId}`).set({

}

async function quickAddRecommendation(tmdbId, mediaType, title){
  const type = mediaType === 'tv' ? 'show' : 'movie';
  const spanishOverview = suggestionOverviews[tmdbId] || '';
  let imdbID = '', rating = '', actors = '', genre = '', poster = '', platformNames = [];
  try{
    const extRes = await fetch(`https://api.themoviedb.org/3/${mediaType}/${tmdbId}/external_ids?api_key=${TMDB_KEY}`);
    const extData = await extRes.json();
    imdbID = extData.imdb_id || '';

    try{
      const provRes = await fetch(`https://api.themoviedb.org/3/${mediaType}/${tmdbId}/watch/providers?api_key=${TMDB_KEY}`);
      const provData = await provRes.json();
      const cl = provData.results && provData.results.CL;
      if(cl && cl.flatrate){ platformNames = filterMainPlatforms(cl.flatrate.map(p => p.provider_name)); }
    } catch(e2){ /* no bloquea */ }

    if(imdbID){
      const res = await fetch(`https://www.omdbapi.com/?apikey=${OMDB_KEY}&i=${encodeURIComponent(imdbID)}`);
      const data = await res.json();
      if(data.Response !== 'False'){
        rating = data.imdbRating && data.imdbRating !== 'N/A' ? data.imdbRating : '';
        actors = data.Actors && data.Actors !== 'N/A' ? data.Actors : '';
        genre = data.Genre && data.Genre !== 'N/A' ? data.Genre : '';
        poster = data.Poster && data.Poster !== 'N/A' ? data.Poster : '';
      }
    }
  } catch(e){ /* guardamos igual con lo que se haya obtenido */ }

  try{
    await itemsCol().add({
      t: title, type, platform: platformNames.slice(0,3).join(', '),
      watched: false, imdbRating: rating, actors, poster, imdbID, genre, plot: spanishOverview,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
  } catch(e){
    showBanner('No se pudo agregar la recomendación. Intenta de nuevo.', 'error');
  }
}

    el.innerHTML = `<div class="imdb-status err">${escapeHTML(errMsg)}</div>`;
    return;
  }
  if(!data){ el.innerHTML = ''; return; }
  const genreLine = data.genre ? `<div class="actors" style="margin-top:2px;">${escapeHTML(translateGenres(data.genre).join(' · '))}</div>` : '';
  const plotLine = data.plot ? `<div class="actors" style="margin-top:5px; font-style:italic;">${escapeHTML(data.plot)}</div>` : '';
  const translatingLine = translating ? `<div class="imdb-status" style="margin-top:5px;">${escapeHTML(errMsg)}</div>` : '';
  el.innerHTML = `
    <div class="imdb-preview">
      ${data.poster ? `<img src="${escapeHTML(data.poster)}" alt="">` : ''}
      <div>

  `;
}

async function translateToSpanish(text){
  try{
    const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|es`);
    const data = await res.json();
    const translated = data && data.responseData && data.responseData.translatedText;
    if(!translated || data.responseStatus !== 200) return null;
    return translated;
  } catch(e){
    return null;
  }
}

let duplicateConfirmed = false;
function checkDuplicate(titleVal){
  duplicateConfirmed = false;
  document.getElementById('saveBtn').textContent = 'Guardar';
  const box = document.getElementById('dupWarning');
  const t = normalize(titleVal);
  if(!t){ box.innerHTML = ''; return; }

  if(match){
    const dateStr = formatDate(match.createdAt);
    box.innerHTML = `<div class="dup-warning">⚠️ Ya tienes "${escapeHTML(match.t)}" en tu lista${dateStr ? ` (agregada ${dateStr})` : ''}. Si guardas, se agregará de todas formas como un título aparte.</div>`;

async function fetchSuggestions(query){
  const box = document.getElementById('titleSuggestions');
  box.innerHTML = `<div class="suggestion-loading">Buscando…</div>`;
  box.classList.add('open');
  try{
    const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${TMDB_KEY}&language=es-419&query=${encodeURIComponent(query)}`);
    const data = await res.json();
    if(data.success === false || data.status_code){
      box.innerHTML = `<div class="suggestion-loading">Error de TMDb: ${escapeHTML(data.status_message || 'clave inválida o sin activar')} (código ${escapeHTML(String(data.status_code || res.status))})</div>`;
      return;
    }
    const results = (data.results || []).filter(r => r.media_type === 'movie' || r.media_type === 'tv');
    if(!results.length){
      box.innerHTML = `<div class="suggestion-loading">Sin resultados. Puedes escribir el título tal cual y buscar manual abajo.</div>`;
      return;
    }
    box.innerHTML = results.slice(0, 8).map(item => {
      const title = item.title || item.name || '';
      const year = (item.release_date || item.first_air_date || '').slice(0,4);
      const poster = item.poster_path ? `${TMDB_IMG}${item.poster_path}` : '';
      const typeLabel = item.media_type === 'tv' ? 'Serie' : 'Película';
      suggestionOverviews[item.id] = item.overview || '';
      return `
      <div class="suggestion-item" data-id="${item.id}" data-media="${item.media_type}" data-title="${escapeHTML(title)}">
        ${poster ? `<img src="${escapeHTML(poster)}" alt="">` : '<div style="width:30px;height:44px;flex-shrink:0;"></div>'}
        <div class="s-info">
          <div class="s-title">${escapeHTML(title)}</div>
          <div class="s-year">${escapeHTML(year)} · ${typeLabel}</div>
        </div>
      </div>
    `;}).join('');
    box.querySelectorAll('.suggestion-item').forEach(el => {
      el.onclick = () => selectSuggestion(el.dataset.id, el.dataset.media, el.dataset.title);
    });
  } catch(e){
    box.innerHTML = `<div class="suggestion-loading">Error de conexión buscando sugerencias.</div>`;
  }
}

function closeSuggestions(){
  const box = document.getElementById('titleSuggestions');
  box.classList.remove('open');
  box.innerHTML = '';
}

async function selectSuggestion(tmdbId, mediaType, title){
  closeSuggestions();
  document.getElementById('fTitle').value = title;
  document.getElementById('fImdbQuery').value = title;
  setModalType(mediaType === 'tv' ? 'show' : 'movie');
  checkDuplicate(title);
  renderImdbPreview(null, 'Cargando datos…');
  const spanishOverview = suggestionOverviews[tmdbId] || '';
  try{
    // 1. Obtener el imdb_id real desde TMDb
    const extRes = await fetch(`https://api.themoviedb.org/3/${mediaType}/${tmdbId}/external_ids?api_key=${TMDB_KEY}`);
    const extData = await extRes.json();
    const imdbID = extData.imdb_id || '';

    // 2. Obtener plataformas de streaming (Chile) desde TMDb
    let platformNames = [];
    try{
      const provRes = await fetch(`https://api.themoviedb.org/3/${mediaType}/${tmdbId}/watch/providers?api_key=${TMDB_KEY}`);
      const provData = await provRes.json();
      const cl = provData.results && provData.results.CL;
      if(cl && cl.flatrate){ platformNames = filterMainPlatforms(cl.flatrate.map(p => p.provider_name)); }
    } catch(e2){ /* no bloquea si falla */ }

    if(platformNames.length){
      document.getElementById('fPlatform').value = platformNames.slice(0,3).join(', ');
    }

    if(!imdbID){
      imdbData = { imdbRating:'', actors:'', poster:'', imdbID:'', genre:'', plot: spanishOverview };
      renderImdbPreview(imdbData, spanishOverview ? null : 'Se cargaron datos básicos, pero no se encontró el ID de IMDb para el rating.');
      return;
    }

    // 3. Traer rating, actores y género desde OMDb (el resumen ya lo tenemos en español desde TMDb)
    const res = await fetch(`https://www.omdbapi.com/?apikey=${OMDB_KEY}&i=${encodeURIComponent(imdbID)}`);
    const data = await res.json();
    if(data.Response === 'False'){
      imdbData = { imdbRating:'', actors:'', poster:'', imdbID:imdbID, genre:'', plot: spanishOverview };
      renderImdbPreview(imdbData, null);
      return;
    }
    imdbData = {
      imdbRating: data.imdbRating && data.imdbRating !== 'N/A' ? data.imdbRating : '',
      actors: data.Actors && data.Actors !== 'N/A' ? data.Actors : '',
      poster: data.Poster && data.Poster !== 'N/A' ? data.Poster : '',
      imdbID: data.imdbID || imdbID,
      genre: data.Genre && data.Genre !== 'N/A' ? data.Genre : '',
      plot: spanishOverview
    };
    renderImdbPreview(imdbData, null);

    // Respaldo: si TMDb no tenía resumen en español, traducimos el de OMDb (en inglés)
    if(!spanishOverview){
      const rawPlot = data.Plot && data.Plot !== 'N/A' ? data.Plot : '';
      if(rawPlot){
        renderImdbPreview(imdbData, 'Traduciendo resumen…', true);
        const translated = await translateToSpanish(rawPlot);
        imdbData.plot = translated || rawPlot;
        renderImdbPreview(imdbData, null);
      }
    }
  } catch(e){
    renderImdbPreview(null, 'Error de conexión al cargar el título.');
  }
}

async function searchImdb(){

  if(!q){ renderImdbPreview(null, 'Escribe un título para buscar.'); return; }

  try{

      imdbData = null;
      renderImdbPreview(null, `No se encontró "${q}" en IMDb. Prueba con el título original en inglés.`);
      return;
    }
    const rawPlot = data.Plot && data.Plot !== 'N/A' ? data.Plot : '';
    imdbData = {
      imdbRating: data.imdbRating && data.imdbRating !== 'N/A' ? data.imdbRating : '',
      actors: data.Actors && data.Actors !== 'N/A' ? data.Actors : '',
      poster: data.Poster && data.Poster !== 'N/A' ? data.Poster : '',
      imdbID: data.imdbID || '',
      genre: data.Genre && data.Genre !== 'N/A' ? data.Genre : '',
      plot: rawPlot
    };
    renderImdbPreview(imdbData, null);

    if(rawPlot){
      renderImdbPreview(imdbData, 'Traduciendo resumen…', true);
      const translated = await translateToSpanish(rawPlot);
      if(translated) imdbData.plot = translated;
      renderImdbPreview(imdbData, null);
    }
  } catch(e){
    imdbData = null;
    renderImdbPreview(null, 'Error de conexión al buscar en IMDb.');
  }
}

async function saveModal(){
  const t = document.getElementById('fTitle').value.trim();
  if(!t) return;
  const platform = document.getElementById('fPlatform').value.trim();

  const match = !editingId ? items.find(i => normalize(i.t) === normalize(t)) : null;
  if(match && !duplicateConfirmed){
    duplicateConfirmed = true;
    const saveBtn = document.getElementById('saveBtn');
    saveBtn.textContent = 'Toca de nuevo para agregar igual';
    return;
  }

  if(!imdbData && t){
    clearTimeout(imdbSearchTimer);
    try{ await searchImdb(); } catch(e){ /* no bloquea el guardado */ }
  }

  const extra = imdbData ? {
    imdbRating: imdbData.imdbRating || '',
    actors: imdbData.actors || '',
    poster: imdbData.poster || '',
    imdbID: imdbData.imdbID || '',
    genre: imdbData.genre || '',
    plot: imdbData.plot || ''
  } : { imdbRating: '', actors: '', poster: '', imdbID: '', genre: '', plot: '' };

  try{
    if(editingId){
      await itemsCol().doc(editingId).update({ t, type: modalType, platform, ...extra });
    } else {
      await itemsCol().add({
        t, type: modalType, platform, watched: false, ...extra,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
    }
    closeModal();
  } catch(e){
    showBanner('No se pudo guardar. Revisa tu conexión e intenta de nuevo.', 'error');
  }
}

document.getElementById('openAdd').onclick = openAdd;
document.getElementById('cancelBtn').onclick = closeModal;
document.getElementById('saveBtn').onclick = saveModal;
document.getElementById('imdbSearchBtn').onclick = searchImdb;
document.getElementById('fTitle').addEventListener('input', scheduleAutoSearch);
document.getElementById('fImdbQuery').addEventListener('input', () => {
  document.getElementById('fImdbQuery').dataset.touched = '1';
  clearTimeout(imdbSearchTimer);
  imdbSearchTimer = setTimeout(searchImdb, 700);
});
document.getElementById('modalBg').onclick = (e) => {
  if(e.target.id === 'modalBg') closeModal();
  if(!e.target.closest('#fTitle') && !e.target.closest('#titleSuggestions')) closeSuggestions();
};
document.addEventListener('click', (e) => {
  if(!e.target.closest('#fTitle') && !e.target.closest('#titleSuggestions')) closeSuggestions();
});

document.getElementById('dupCloseBtn').onclick = () => document.getElementById('dupModalBg').classList.remove('open');
document.getElementById('dupModalBg').onclick = (e) => { if(e.target.id === 'dupModalBg') document.getElementById('dupModalBg').classList.remove('open'); };

document.getElementById('searchInput').addEventListener('input', (e) => {
  searchQuery = e.target.value;
  document.getElementById('clearSearch').style.display = searchQuery ? 'block' : 'none';
  render();
});
document.getElementById('clearSearch').onclick = () => {
  searchQuery = '';
  document.getElementById('searchInput').value = '';
  document.getElementById('clearSearch').style.display = 'none';
  render();
};
document.querySelectorAll('.type-toggle button').forEach(b => {
  b.onclick = () => setModalType(b.dataset.type);
});

document.querySelectorAll('.tab').forEach(tab => {
  tab.onclick = () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentFilter = tab.dataset.filter;
    render();
  };
});

document.getElementById('sortSelect').addEventListener('change', (e) => {
  sortMode = e.target.value;
  render();
});

init();
</script>
  </div>

</body>
</html>
